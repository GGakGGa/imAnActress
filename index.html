<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Easter Egg</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body{
      overflow:hidden;
      background:#000;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif;

      --bg: url("./bg1_1.jpg");
      background-image: var(--bg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      cursor: ew-resize;
    }

    /* 안내(선택) */
    .ui {
      position: fixed;
      left: 16px; bottom: 16px;
      color: rgba(255,255,255,.75);
      font-size: 13px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
      user-select:none;
      pointer-events:none;
    }
    body.revealed .ui { display:none; }

    /* 메시지/랜덤 텍스트 공통 */
    .flash{
      position:absolute;
      color:#ff2b2b;
      font-weight:800;
      text-shadow:0 2px 12px rgba(0,0,0,.65);
      opacity:0;
      transform:translate(-50%,-50%) scale(0.98);
      pointer-events:none;
      user-select:none;
      white-space:nowrap;
      will-change:transform,opacity;
      animation: pop 1.4s ease-in-out forwards;
    }
    @keyframes pop{
      0%{opacity:0; transform:translate(-50%,-50%) scale(0.96);}
      15%{opacity:1; transform:translate(-50%,-50%) scale(1.02);}
      70%{opacity:1; transform:translate(-50%,-50%) scale(1.00);}
      100%{opacity:0; transform:translate(-50%,-50%) scale(1.01);}
    }

    /* 지지직 오버레이 */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:0;
      mix-blend-mode:screen;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.10) 0px,
          rgba(255,255,255,.10) 1px,
          rgba(0,0,0,0) 3px,
          rgba(0,0,0,0) 6px
        ),
        repeating-linear-gradient(
          to right,
          rgba(255,0,0,.05) 0px,
          rgba(0,255,255,.05) 2px,
          rgba(0,0,0,0) 6px
        );
      filter: contrast(140%) saturate(160%);
      transform: translate3d(0,0,0);
    }
    body.glitching::before{
      opacity:1;
      animation: glitchFlicker 650ms steps(2,end) forwards;
    }
    @keyframes glitchFlicker{
      0%{opacity:0; transform:translate(0,0) skewX(0deg);}
      10%{opacity:.9; transform:translate(-6px,2px) skewX(-6deg);}
      22%{opacity:.2; transform:translate(8px,-2px) skewX(8deg);}
      35%{opacity:1; transform:translate(-10px,0) skewX(-10deg);}
      55%{opacity:.35; transform:translate(12px,2px) skewX(12deg);}
      75%{opacity:.95; transform:translate(-4px,-2px) skewX(-4deg);}
      100%{opacity:0; transform:translate(0,0) skewX(0deg);}
    }
  </style>
</head>
<body>
  <div class="ui">← / → 또는 스와이프 (클릭은 →)</div>

  <script>
    // ===== 설정 =====
    const BG1 = ["bg1_1.jpg","bg1_2.jpg","bg1_3.jpg","bg1_4.jpg","bg1_5.jpg"];
    const BG2 = "bg2.jpg";

    // 끝에서 더 넘길 때 메시지(1~5회)
    const EDGE_WARNINGS = [
      "더 이상 없습니다",
      "더 이상 없어요",
      "넘기지 마요",
      "제발 보지 말아줘요",
      "…"
    ];

    // bg2 연출 중 랜덤 텍스트
    const TEXTS = [
      "여기까지 왔네",
      "봤지?",
      "돌아가",
      "늦었어",
      "…"
    ];

    const INTERVAL_MS = 850;
    const LIFETIME_MS = 1400;
    const MARGIN = 24;
    const MIN_SIZE = 16;
    const MAX_SIZE = 44;

    // ===== 상태 =====
    let idx = 0;                 // 0~4
    let edgeAttempts = 0;        // 마지막에서 오른쪽 시도 횟수
    let revealed = false;        // bg2 연출 진입 여부
    let intervalId = null;

    function setBg(url){
      document.body.style.setProperty("--bg", `url("./${url}")`);
    }

    function rand(min,max){ return Math.random()*(max-min)+min; }
    function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

    function rand(min,max){ return Math.random()*(max-min)+min; }

    function clamp(v, min, max){
        return Math.max(min, Math.min(max, v));
    }

    // ✅ 화면 밖으로 안 나가게 보정되는 spawnFlash
    function spawnFlash(text, opts = {}) {
        const el = document.createElement("div");
        el.className = "flash";
        el.textContent = text;

        // 폰트 사이즈 먼저 결정
        const size = opts.size ?? Math.round(rand(MIN_SIZE, MAX_SIZE));
        el.style.fontSize = `${size}px`;

        // 측정용으로 먼저 붙이되, 눈에 안 띄게
        el.style.left = "0px";
        el.style.top = "0px";
        el.style.opacity = "0";
        document.body.appendChild(el);

        // 실제 렌더된 크기 측정
        const rect = el.getBoundingClientRect();
        const halfW = rect.width / 2;
        const halfH = rect.height / 2;

        const w = innerWidth;
        const h = innerHeight;

        // 원하는 랜덤 좌표(없으면 전체 랜덤)
        let x = (opts.x ?? rand(MARGIN, w - MARGIN));
        let y = (opts.y ?? rand(MARGIN, h - MARGIN));

        // ✅ 텍스트가 화면 안에 들어오도록 보정
        const minX = MARGIN + halfW;
        const maxX = w - MARGIN - halfW;
        const minY = MARGIN + halfH;
        const maxY = h - MARGIN - halfH;

        // 화면이 너무 작아서(min>max) 역전되는 경우 대비
        x = clamp(x, Math.min(minX, maxX), Math.max(minX, maxX));
        y = clamp(y, Math.min(minY, maxY), Math.max(minY, maxY));

        el.style.left = `${x}px`;
        el.style.top  = `${y}px`;

        // 이제 보여주기(애니메이션은 CSS에서 opacity를 컨트롤)
        el.style.opacity = ""; // 인라인 0 제거

        setTimeout(() => el.remove(), LIFETIME_MS);
    }

    function startRandomShow(){
      if (intervalId) return;
      spawnFlash(pick(TEXTS));
      intervalId = setInterval(() => spawnFlash(pick(TEXTS)), INTERVAL_MS);
    }

    function revealSequence(){
      if (revealed) return;
      revealed = true;
      document.body.classList.add("glitching");

      // 글리치 중간에 배경 바꾸기
      setTimeout(() => {
        setBg(BG2);
        document.body.classList.add("revealed");
      }, 180);

      setTimeout(() => {
        document.body.classList.remove("glitching");
      }, 700);

      setTimeout(() => {
        startRandomShow();
      }, 260);
    }

    function goLeft(){
      if (revealed) return;
      if (idx > 0) {
        idx--;
        setBg(BG1[idx]);
      }
      // 왼쪽은 경고 누적 안 함(원하면 초기화 가능)
    }

    function goRight(){
      if (revealed) return;

      // 아직 끝이 아니면 정상 넘김 + 누적 리셋
      if (idx < BG1.length - 1) {
        idx++;
        setBg(BG1[idx]);
        edgeAttempts = 0;
        return;
      }

      // 끝인데 더 넘기려고 함
      edgeAttempts++;

      const msg = EDGE_WARNINGS[Math.min(edgeAttempts - 1, EDGE_WARNINGS.length - 1)];
      // 끝쪽 느낌으로 오른쪽 가장자리 근처에 띄우기
      spawnFlash(msg, {
        x: rand(innerWidth * 0.72, innerWidth - MARGIN),
        y: rand(MARGIN, innerHeight - MARGIN),
        size: Math.round(rand(18, 40))
      });

      if (edgeAttempts >= 5) {
        revealSequence();
      }
    }

    // ===== 입력 처리 =====
    // 키보드
    addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") goLeft();
      if (e.key === "ArrowRight") goRight();
    });

    // 클릭: 오른쪽 넘김으로 취급
    addEventListener("click", () => goRight());

    // 터치 스와이프
    let touchX = null;
    addEventListener("touchstart", (e) => {
      touchX = e.touches?.[0]?.clientX ?? null;
    }, { passive: true });

    addEventListener("touchend", (e) => {
      if (touchX === null) return;
      const endX = e.changedTouches?.[0]?.clientX ?? touchX;
      const dx = endX - touchX;
      touchX = null;

      if (Math.abs(dx) < 30) return; // 민감도
      if (dx > 0) goLeft();
      else goRight();
    }, { passive: true });

    // 시작 배경
    setBg(BG1[idx]);

    // 탭 비활성화 시 인터벌 정리
    document.addEventListener("visibilitychange", () => {
      if (document.hidden && intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      } else if (!document.hidden && revealed && !intervalId) {
        startRandomShow();
      }
    });
  </script>
</body>
</html>
