<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Easter Egg</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body{
      overflow:hidden;
      background:#000;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif;
    }

    /* ===== 이미지(더블 버퍼) ===== */
    .viewer{
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      will-change: opacity, transform, filter;
      transform: translateZ(0);
    }
    /* ✅ 기본은 A가 보이고, B는 숨김 */
    #imgA{ opacity: 1; }
    #imgB{ opacity: 0; }

    /* ===== 슬라이드 전환 ===== */
    .inFromRight{ animation: inFromRight 420ms cubic-bezier(.2,.9,.2,1) forwards; }
    .outToLeft{   animation: outToLeft   420ms cubic-bezier(.2,.9,.2,1) forwards; }
    .inFromLeft{  animation: inFromLeft  420ms cubic-bezier(.2,.9,.2,1) forwards; }
    .outToRight{  animation: outToRight  420ms cubic-bezier(.2,.9,.2,1) forwards; }

    @keyframes inFromRight{
      0%{ opacity:0; transform: translateX(6.5%) scale(1.005); filter: blur(1px); }
      100%{ opacity:1; transform: translateX(0%) scale(1.0); filter: blur(0px); }
    }
    @keyframes outToLeft{
      0%{ opacity:1; transform: translateX(0%) scale(1.0); filter: blur(0px); }
      100%{ opacity:0; transform: translateX(-6.5%) scale(0.997); filter: blur(1px); }
    }
    @keyframes inFromLeft{
      0%{ opacity:0; transform: translateX(-6.5%) scale(1.005); filter: blur(1px); }
      100%{ opacity:1; transform: translateX(0%) scale(1.0); filter: blur(0px); }
    }
    @keyframes outToRight{
      0%{ opacity:1; transform: translateX(0%) scale(1.0); filter: blur(0px); }
      100%{ opacity:0; transform: translateX(6.5%) scale(0.997); filter: blur(1px); }
    }

    /* ===== 상단 문구(겹침 방지 강화) ===== */
    .headline{
      position: fixed;
      top: clamp(16px, 3vh, 36px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;

      display: grid;
      /* ✅ 가운데 슬롯을 더 넓게 + 최소폭 크게 */
      grid-template-columns: auto minmax(14ch, 18ch) auto;
      align-items: center;
      /* ✅ 간격 확대 */
      column-gap: 18px;

      white-space: nowrap;
      user-select: none;
      pointer-events: none;

      text-shadow: 0 10px 40px rgba(0,0,0,.75);
      padding: 10px 16px;
      border-radius: 14px;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.10);
    }

    .pre, .post{
      font-size: clamp(18px, 2.2vw, 34px);
      font-weight: 700;
      color: rgba(255,255,255,.88);
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    /* ✅ pre/post가 슬롯 쪽으로 밀고 들어오지 않게 최소폭 방어(선택) */
    .pre{ min-width: 8ch; }
    .post{ min-width: 9ch; }

    .slot{
      justify-self: center;
      display: inline-flex;
      justify-content: center;
      align-items: center;

      /* ✅ 슬롯 내부 패딩도 확대 */
      padding: 0 14px;

      width: 100%;
      font-size: clamp(22px, 2.7vw, 40px);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: rgba(255, 90, 90, .95);
      line-height: 1.1;
    }
    .slot span{ display:inline-block; transform-origin: 50% 60%; }

    .slotPop{ animation: slotPop 260ms ease-out; }
    @keyframes slotPop{
      0%{ transform: translateY(-2px) scale(0.98); opacity: .25; }
      60%{ transform: translateY(0px) scale(1.03); opacity: 1; }
      100%{ transform: translateY(0px) scale(1.00); opacity: 1; }
    }
    body.revealed .slot{ color: rgba(255, 60, 60, .95); }

    /* ===== 좌/우 버튼 ===== */
    .navBtn{
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 58px;
      height: 90px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.86);
      display:grid;
      place-items:center;
      cursor: pointer;
      z-index: 25;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      transition: transform .12s ease, background .12s ease, opacity .12s ease;
      user-select:none;
    }
    .navBtn:hover{ background: rgba(255,255,255,.14); transform: translateY(-50%) scale(1.02); }
    .navBtn:active{ background: rgba(255,255,255,.20); transform: translateY(-50%) scale(0.98); }
    .navBtn.left{ left: clamp(12px, 2vw, 28px); }
    .navBtn.right{ right: clamp(12px, 2vw, 28px); }
    .chev{ font-size: 36px; font-weight: 900; line-height: 1; text-shadow: 0 10px 30px rgba(0,0,0,.6); }
    body.revealed .navBtn{ opacity: .15; pointer-events: none; }

    /* ===== 플래시 ===== */
    .flash{
      position:fixed;
      color:#ff2b2b;
      font-weight:800;
      text-shadow:0 2px 12px rgba(0,0,0,.65);
      opacity:0;
      transform:translate(-50%,-50%) scale(0.98);
      pointer-events:none;
      user-select:none;
      white-space:nowrap;
      will-change:transform,opacity;
      animation: pop 1.4s ease-in-out forwards;
      z-index: 60;
    }
    @keyframes pop{
      0%{opacity:0; transform:translate(-50%,-50%) scale(0.96);}
      15%{opacity:1; transform:translate(-50%,-50%) scale(1.02);}
      70%{opacity:1; transform:translate(-50%,-50%) scale(1.00);}
      100%{opacity:0; transform:translate(-50%,-50%) scale(1.01);}
    }

    /* ===== 글리치 ===== */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:0;
      mix-blend-mode:screen;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.10) 0px,
          rgba(255,255,255,.10) 1px,
          rgba(0,0,0,0) 3px,
          rgba(0,0,0,0) 6px
        ),
        repeating-linear-gradient(
          to right,
          rgba(255,0,0,.05) 0px,
          rgba(0,255,255,.05) 2px,
          rgba(0,0,0,0) 6px
        );
      filter: contrast(140%) saturate(160%);
      transform: translate3d(0,0,0);
      z-index: 50;
    }
    body.glitching::before{
      opacity:1;
      animation: glitchFlicker 650ms steps(2,end) forwards;
    }
    @keyframes glitchFlicker{
      0%{opacity:0; transform:translate(0,0) skewX(0deg);}
      10%{opacity:.9; transform:translate(-6px,2px) skewX(-6deg);}
      22%{opacity:.2; transform:translate(8px,-2px) skewX(8deg);}
      35%{opacity:1; transform:translate(-10px,0) skewX(-10deg);}
      55%{opacity:.35; transform:translate(12px,2px) skewX(12deg);}
      75%{opacity:.95; transform:translate(-4px,-2px) skewX(-4deg);}
      100%{opacity:0; transform:translate(0,0) skewX(0deg);}
    }

    body.glitching .headline{
      animation: textJitter 650ms steps(2,end) forwards;
    }
    @keyframes textJitter{
      0%{ transform:translateX(-50%); }
      12%{ transform:translateX(calc(-50% - 6px)) skewX(-6deg); }
      28%{ transform:translateX(calc(-50% + 8px)) skewX(8deg); }
      42%{ transform:translateX(calc(-50% - 10px)) skewX(-10deg); }
      60%{ transform:translateX(calc(-50% + 12px)) skewX(12deg); }
      100%{ transform:translateX(-50%) skewX(0deg); }
    }
  </style>
</head>

<body>
  <div class="headline" aria-hidden="true">
    <span class="pre" id="tPre">선배를 위해 저는</span>
    <span class="slot"><span id="tSlot">욕데레</span></span>
    <span class="post" id="tPost">가 될 수 있어요!</span>
  </div>

  <img id="imgA" class="viewer" src="" alt="viewer A" />
  <img id="imgB" class="viewer" src="" alt="viewer B" />

  <button class="navBtn left" id="btnLeft" aria-label="Previous"><div class="chev">&lt;</div></button>
  <button class="navBtn right" id="btnRight" aria-label="Next"><div class="chev">&gt;</div></button>

  <script>
    const ASSET_PREFIX = "./"; // images/면 "./images/"
    const BG1 = ["bg1_1.png","bg1_2.png","bg1_3.png","bg1_4.png","bg1_5.png"];
    const BG2 = "bg2.png";
    const DERE_TYPES = ["메가데레","츤데레","욕데레","쿨데레","얀데레"];

    const EDGE_WARNINGS = ["더 이상 없습니다","더 이상 없어요","넘기지 마요","제발 보지 말아줘요","…"];
    const TEXTS = ["여기까지 왔네","봤지?","돌아가","늦었어","…"];

    const INTERVAL_MS = 850;
    const LIFETIME_MS = 1400;
    const MARGIN = 24;
    const MIN_SIZE = 16;
    const MAX_SIZE = 44;

    let idx = 2;                 // bg1_3에서 시작
    let revealed = false;

    let attemptDir = null;       // 'L' or 'R'
    let attemptStreak = 0;

    let intervalId = null;

    const imgA = document.getElementById("imgA");
    const imgB = document.getElementById("imgB");
    let front = imgA;
    let back  = imgB;
    let transitioning = false;

    const tPre  = document.getElementById("tPre");
    const tSlot = document.getElementById("tSlot");
    const tPost = document.getElementById("tPost");

    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");

    function rand(min,max){ return Math.random()*(max-min)+min; }
    function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function setSlot(text){
      tSlot.textContent = text;
      tSlot.classList.remove("slotPop");
      void tSlot.offsetWidth;
      tSlot.classList.add("slotPop");
    }
    function setHeadlineBG1(i){
      tPre.textContent  = "선배를 위해 저는";
      setSlot(DERE_TYPES[i] ?? "…");
      tPost.textContent = "가 될 수 있어요!";
    }
    function setHeadlineBG2(){
      tPre.textContent  = "선배를 위해 저는";
      setSlot("제 스스로가");
      tPost.textContent = "될 수 없어요";
    }

    function spawnFlash(text, opts = {}) {
      const el = document.createElement("div");
      el.className = "flash";
      el.textContent = text;

      const size = opts.size ?? Math.round(rand(MIN_SIZE, MAX_SIZE));
      el.style.fontSize = `${size}px`;

      el.style.left = "0px";
      el.style.top = "0px";
      el.style.opacity = "0";
      document.body.appendChild(el);

      const rect = el.getBoundingClientRect();
      const halfW = rect.width / 2;
      const halfH = rect.height / 2;

      const w = innerWidth;
      const h = innerHeight;

      let x = (opts.x ?? rand(MARGIN, w - MARGIN));
      let y = (opts.y ?? rand(MARGIN, h - MARGIN));

      const minX = MARGIN + halfW;
      const maxX = w - MARGIN - halfW;
      const minY = MARGIN + halfH;
      const maxY = h - MARGIN - halfH;

      x = clamp(x, Math.min(minX, maxX), Math.max(minX, maxX));
      y = clamp(y, Math.min(minY, maxY), Math.max(minY, maxY));

      el.style.left = `${x}px`;
      el.style.top  = `${y}px`;
      el.style.opacity = "";

      setTimeout(() => el.remove(), LIFETIME_MS);
    }

    function startRandomShow(){
      if (intervalId) return;
      spawnFlash(pick(TEXTS));
      intervalId = setInterval(() => spawnFlash(pick(TEXTS)), INTERVAL_MS);
    }
    function stopRandomShow(){
      if (!intervalId) return;
      clearInterval(intervalId);
      intervalId = null;
    }

    function clearAnimOnly(el){
      el.classList.remove("inFromRight","outToLeft","inFromLeft","outToRight");
      el.style.transform = "";
      el.style.filter = "";
      // ✅ opacity는 여기서 건드리지 않음(핵심)
    }

    // ✅ 전환 완료 후 "보이는 상태"를 확정해버리는 함수
    function commitVisibility(){
      front.style.opacity = "1";
      back.style.opacity = "0";
    }

    function transitionTo(url, dir){
      if (transitioning) return;
      transitioning = true;

      clearAnimOnly(front);
      clearAnimOnly(back);

      back.src = `${ASSET_PREFIX}${url}`;
      back.style.opacity = "0"; // 시작은 숨김

      const onLoad = () => {
        back.removeEventListener("load", onLoad);

        if (dir === "R"){
          back.classList.add("inFromRight");
          front.classList.add("outToLeft");
        } else {
          back.classList.add("inFromLeft");
          front.classList.add("outToRight");
        }

        setTimeout(() => {
          const tmp = front; front = back; back = tmp;

          clearAnimOnly(back);
          clearAnimOnly(front);

          // ✅ 항상 front=1, back=0 보장
          commitVisibility();

          transitioning = false;
        }, 450);
      };

      back.addEventListener("load", onLoad);
    }

    function hardSwapTo(url){
      transitioning = false;
      clearAnimOnly(front);
      clearAnimOnly(back);

      front.src = `${ASSET_PREFIX}${url}`;

      // ✅ 즉시 보이게 확정
      commitVisibility();
    }

    function resetEdgeAttempts(){
      attemptDir = null;
      attemptStreak = 0;
    }

    function recordEdgeAttempt(dir){
      if (attemptDir !== dir){
        attemptDir = dir;
        attemptStreak = 0;
      }
      attemptStreak++;

      const msg = EDGE_WARNINGS[Math.min(attemptStreak - 1, EDGE_WARNINGS.length - 1)];
      spawnFlash(msg, {
        x: dir === "R" ? rand(innerWidth * 0.72, innerWidth - MARGIN) : rand(MARGIN, innerWidth * 0.28),
        y: rand(MARGIN, innerHeight - MARGIN),
        size: Math.round(rand(18, 40))
      });

      if (attemptStreak >= 5) revealSequence();
    }

    function revealSequence(){
      if (revealed) return;
      revealed = true;

      document.body.classList.add("glitching");

      setTimeout(() => {
        hardSwapTo(BG2);       // ✅ bg1 비침 방지
        setHeadlineBG2();
        document.body.classList.add("revealed");
      }, 140);

      setTimeout(() => {
        document.body.classList.remove("glitching");
      }, 700);

      setTimeout(() => startRandomShow(), 260);
    }

    function goLeft(){
      if (revealed) return;

      if (idx > 0){
        idx--;
        transitionTo(BG1[idx], "L");
        setHeadlineBG1(idx);
        resetEdgeAttempts();
        return;
      }
      recordEdgeAttempt("L");
    }

    function goRight(){
      if (revealed) return;

      if (idx < BG1.length - 1){
        idx++;
        transitionTo(BG1[idx], "R");
        setHeadlineBG1(idx);
        resetEdgeAttempts();
        return;
      }
      recordEdgeAttempt("R");
    }

    btnLeft.addEventListener("click", (e) => { e.stopPropagation(); goLeft(); });
    btnRight.addEventListener("click", (e) => { e.stopPropagation(); goRight(); });

    addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") goLeft();
      if (e.key === "ArrowRight") goRight();
      if (e.key === " " || e.key === "Spacebar") goRight();
    });

    addEventListener("click", () => goRight());

    let touchX = null;
    addEventListener("touchstart", (e) => {
      touchX = e.touches?.[0]?.clientX ?? null;
    }, { passive: true });

    addEventListener("touchend", (e) => {
      if (touchX === null) return;
      const endX = e.changedTouches?.[0]?.clientX ?? touchX;
      const dx = endX - touchX;
      touchX = null;

      if (Math.abs(dx) < 30) return;
      if (dx > 0) goLeft();
      else goRight();
    }, { passive: true });

    // 시작(확정 표시)
    front.src = `${ASSET_PREFIX}${BG1[idx]}`;
    commitVisibility();
    setHeadlineBG1(idx);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopRandomShow();
      else if (!document.hidden && revealed && !intervalId) startRandomShow();
    });

    imgA.addEventListener("error", () => console.error("이미지 로드 실패:", imgA.src));
    imgB.addEventListener("error", () => console.error("이미지 로드 실패:", imgB.src));
  </script>
</body>
</html>
